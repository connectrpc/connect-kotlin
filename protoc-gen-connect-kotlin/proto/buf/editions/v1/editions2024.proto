edition = "2024";

package buf.editions.v1;

import "google/protobuf/java_features.proto";

message Editions2024Request {
  option features.(pb.java).nest_in_file_class = YES;

  string name = 1;
}

message Editions2024Response {
  string result = 1;
}

service Editions2024Service {
  rpc Editions2024(Editions2024Request) returns (Editions2024Response) {}
}
